services:

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    build: .
    command: celery -A celery_worker worker --loglevel=info --pool=solo
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    build: .
    command: python schedule_test.py
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started